name: Kindergarten Info Bot

on:
  schedule:
    - cron: '0 1,13 * * *' # 香港時間 9:00 AM 和 9:00 PM
  workflow_dispatch: # 允許手動觸發測試

# 加入這部分來解決權限問題
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 已更新至 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 已更新至 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kindergarten_bot.py

      - name: Save state (Keep seen_links updated)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_links.txt
          # 檢查是否有變動，避免無變動時 commit 報錯
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen_links cache [skip ci]"
            git push
          fi
