name: Kindergarten Info Bot

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # --- 加入這兩行 ---
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ----------------
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ... 後續步驟保持不變 ...

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kindergarten_bot.py

      - name: Save state (Keep seen_links updated)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_links.txt
          # 檢查是否有變動，避免無變動時 commit 報錯
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen_links cache [skip ci]"
            git push
          fi
          
      - name: Checkout code
        uses: actions/checkout@v4.1.1 # 指定更具體的次版本

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
